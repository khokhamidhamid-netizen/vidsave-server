<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفظ الفيديوهات</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        h2 { color: #1c1e21; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #606770; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>تحميل فيديو يوتيوب 🎥</h2>
        <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا">
        <button onclick="downloadVideo()">تحميل الآن</button>
        <p id="status"></p>
    </div>

    <script>
        function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const status = document.getElementById('status');

            if (!urlInput) {
                alert('يرجى لصق الرابط أولاً');
                return;
            }
            
            status.innerText = "جاري فتح صفحة التحميل...";
            
            // استخراج ID الفيديو لضمان عمل الرابط بشكل صحيح
            const videoId = extractId(urlInput);
            const finalLink = "https://www.y2mate.com/youtube/" + videoId;
            
            setTimeout(() => {
                window.open(finalLink, '_blank');
                status.innerText = "تمت العملية بنجاح!";
            }, 1000);
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }
    </script>
</body>
</html>
