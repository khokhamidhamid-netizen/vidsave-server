<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidsave Pro | Ali Tabet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; width: 90%; max-width: 450px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 5px; }
        .footer { font-size: 12px; color: #777; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #333; border-radius: 10px; background: #252525; color: white; text-align: center; outline: none; }
        button { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #cc0000; transform: scale(1.02); }
        #resultArea { margin-top: 25px; display: none; background: #252525; padding: 15px; border-radius: 12px; border: 1px dashed #444; }
        iframe { width: 100%; border: none; border-radius: 8px; background: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎥 Vidsave Pro</h2>
        <div class="footer">تطوير المبرمج علي تابت</div>
        
        <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا">
        <button onclick="startDownload()">استخراج روابط التحميل</button>
        
        <div id="resultArea">
            <p style="margin-bottom: 15px; font-size: 14px;">اختر الجودة المطلوبة للتحميل:</p>
            <div id="loader"></div>
        </div>
    </div>

    <script>
        function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');

            if (!url) return alert("يرجى وضع الرابط أولاً");

            resultArea.style.display = "block";
            // استخدام محرك متوافق جداً مع Iframe لضمان الظهور
            const cleanUrl = url.split('&')[0];
            loader.innerHTML = `<iframe src="https://shsec.online?url=${encodeURIComponent(cleanUrl)}" width="100%" height="200px"></iframe>`;
        }
    </script>
</body>
</html>
